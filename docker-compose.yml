services:
  mongo:
    image: mongo:7
    container_name: rentz-arena-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: rentz-arena
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: rentz-arena-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/rentz-arena
    ports:
      - "4000:4000"

volumes:
  mongo-data:
